name: test-pipeline

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1-5"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage gate
        run: |
          python -m pytest unit_tests --cov=program_files --cov-config=.coveragerc --cov-fail-under=80 --cov-report=term-missing --cov-report=xml --junitxml=unit-junit.xml

      - name: Upload unit reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            unit-junit.xml
            coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration scenarios
        run: |
          python -m pytest integration_tests -m integration --junitxml=integration-junit.xml

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: integration-junit.xml

  e2e-tests:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run e2e scenarios
        run: |
          python -m pytest e2e_tests -m e2e --junitxml=e2e-junit.xml

      - name: Upload e2e report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e-junit.xml

  system-tests:
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run system quality scenarios
        run: |
          python -m pytest system_tests -m system --junitxml=system-junit.xml

      - name: Upload system report
        uses: actions/upload-artifact@v4
        with:
          name: system-test-report
          path: system-junit.xml
