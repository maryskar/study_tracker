name: test-pipeline

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "0 6 * * 1-5"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage gate
        run: |
          pytest tests --cov=program_files --cov-fail-under=80 --cov-report=xml --junitxml=unit-junit.xml

      - name: Upload unit reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            unit-junit.xml
            coverage.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run integration scenarios
        run: |
          pytest integration_tests -m integration --junitxml=integration-junit.xml

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: integration-junit.xml

