[pytest]
minversion = 7.0
testpaths = tests integration_tests e2e_tests system_tests
pythonpath = .
addopts = -q --strict-markers
filterwarnings =
    ignore:'crypt' is deprecated and slated for removal in Python 3.13:DeprecationWarning:passlib.utils
markers =
    integration: integration scenario tests
    e2e: end-to-end workflow tests
    system: system-level quality tests
    load: performance/load tests
    stability: long-run stability tests
    recovery: failure/recovery tests
    volume: high-volume data tests
